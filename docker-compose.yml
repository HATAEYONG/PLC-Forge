services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plcforge}
      POSTGRES_USER: ${POSTGRES_USER:-plcforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plcforge}
    command: ["postgres", "-c", "client_encoding=UTF8"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plcforge}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      POSTGRES_DB: ${POSTGRES_DB:-plcforge}
      POSTGRES_USER: ${POSTGRES_USER:-plcforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plcforge}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      # 컨테이너 내부에서 backend 서비스로 프록시
      VITE_PROXY_TARGET: http://backend:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
